<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欢迎访问我的网站</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Microsoft YaHei",Arial,sans-serif;
    background:#f5f7fa;
    color:#333;
}

header{
    background:linear-gradient(135deg,#4CAF50,#2196F3);
    color:#fff;
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:36px;
    margin-bottom:15px;
}

header p{
    font-size:18px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:40px auto;
}

.card{
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
    padding:30px;
}

.card h2{
    margin-bottom:15px;
    color:#2196F3;
}

.card p{
    line-height:1.8;
    margin-bottom:10px;
}

button{
    margin-top:20px;
    background:#2196F3;
    color:white;
    border:none;
    padding:12px 28px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1976D2;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

.contact{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.item{
    background:#f7f7f7;
    border-radius:10px;
    padding:15px;
    text-align:center;
}
</style>

</head>

<body>

<header>

<h1>欢迎来到我的网站</h1>

<p>扫一扫即可访问本页面</p>

</header>

<div class="container">

<div class="card">

<h2>产品介绍</h2>

<p>
这里可以介绍你的产品、公司、活动或者服务。
</p>

<p>
这个网页是纯 HTML 制作，无需数据库，可以直接部署到 Cloudflare Pages 或其他静态网站平台。
</p>

<button onclick="showMessage()">
了解更多
</button>

</div>

<div class="card">

<h2>我们的优势</h2>

<p>✔ 响应式设计，支持手机和平板</p>

<p>✔ 微信扫一扫即可打开</p>

<p>✔ 支持HTTPS</p>

<p>✔ 后续更新无需重新制作二维码</p>

</div>

<div class="card">

<h2>联系我们</h2>

<div class="contact">

<div class="item">
<h3>📞 电话</h3>
<p>138-0000-0000</p>
</div>

<div class="item">
<h3>📧 邮箱</h3>
<p>demo@example.com</p>
</div>

<div class="item">
<h3>📍 地址</h3>
<p>上海市浦东新区</p>
</div>

</div>

</div>

</div>

<footer>

© 2026 Demo Company 版权所有

</footer>

<script>

function showMessage(){

    alert("欢迎访问我的网站！");

}

</script>

</body>
</html>
