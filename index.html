<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>国（境）外学历学位认证书</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #f1f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue",
        Arial, "Microsoft YaHei", sans-serif;
      color: #222;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #f1f2f5;
    }

    .content {
      width: 100%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
    }

    .header {
      width: 100%;
      height: 135px;
      background: #2d5fa7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .header img {
      width: 444px;
      height: 82px;
      display: block;
    }

    .title {
      height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      line-height: 1;
      font-weight: 400;
      color: #111;
      letter-spacing: 8px;
      border-bottom: 1px solid #e1e1e1;
      background: #fff;
      padding-left: 8px;
      white-space: nowrap;
    }

    .info-list {
      background: #fff;
      padding-left: 30px;
    }

    .info-row {
      height: 130px;
      border-bottom: 1px solid #dedede;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 22px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .label-img {
      display: block;
      height: auto;
      object-fit: contain;
      object-position: left center;
      margin: 0 0 18px 0;
    }

    .icon-cert-name {
      width: 137px;
    }

    .icon-cert-no {
      width: 144px;
    }

    .icon-holder {
      width: 114px;
    }

    .icon-holder-type {
      width: 174px;
    }

    .icon-holder-code {
      width: 174px;
    }

    .icon-start-date {
      width: 170px;
    }

    .icon-end-date {
      width: 170px;
    }

    .icon-issue-department {
      width: 146px;
    }

    .icon-issue-date {
      width: 143px;
    }

    .icon-cert-status {
      width: 142px;
    }

    .value {
      font-size: 28px;
      line-height: 34px;
      color: #8f9399;
      font-weight: 400;
      letter-spacing: 0;
    }

    @media screen and (min-width: 431px) {
      .page {
        max-width: 828px;
        margin: 0 auto;
      }
    }

    @media screen and (max-width: 380px) {
      .title {
        font-size: 30px;
        letter-spacing: 6px;
      }

      .info-list {
        padding-left: 26px;
      }

      .value {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="content">
      <section class="header">
        <img src="./assets/cscse_header.png" alt="教育部留学服务中心" />
      </section>

      <section class="title">
        国（境）外学历学位认证书
      </section>

      <section class="info-list">
        <div class="info-row">
          <img class="label-img icon-cert-name" src="./assets/icon_cert_name.png" alt="证照名称" />
          <div class="value">国外学历学位认证书</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-cert-no" src="./assets/icon_cert_no.png" alt="证照编号" />
          <div class="value">120250152857</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-holder" src="./assets/icon_holder.png" alt="持证者" />
          <div class="value">胡元帅</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-holder-type" src="./assets/icon_holder_type.png" alt="持证者类型" />
          <div class="value">身份证</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-holder-code" src="./assets/icon_holder_code.png" alt="持证者代码" />
          <div class="value">320683200111210313</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-start-date" src="./assets/icon_start_date.png" alt="起始有效期" />
          <div class="value">长期</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-end-date" src="./assets/icon_end_date.png" alt="截至有效期" />
          <div class="value">长期</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-issue-department" src="./assets/icon_issue_department.png" alt="颁发部门" />
          <div class="value">教育部留学服务中心</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-issue-date" src="./assets/icon_issue_date.png" alt="颁发日期" />
          <div class="value">2025-11-25</div>
        </div>

        <div class="info-row">
          <img class="label-img icon-cert-status" src="./assets/icon_cert_status.png" alt="证照状态" />
          <div class="value">有效</div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
